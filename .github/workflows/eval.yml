name: Skill Eval Gate

on:
  pull_request:
    paths:
      - 'skills/**'

# the eval job posts its verdict as a PR comment; the default token is read-only
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    name: Validate skill format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: skills validate --all

  eval:
    name: Run eval gate
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Same owner as this repo (works on a personal fork without extra config).
      # EVAL_PLATFORM_TOKEN is only needed when the platform repo is private;
      # for a public repo the default github.token suffices.
      - name: Checkout eval platform
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/skill-testing-playground
          path: eval-platform
          token: ${{ secrets.EVAL_PLATFORM_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed skill
        id: skill
        run: |
          CHANGED=$(git diff --name-only HEAD^1 HEAD | grep 'skills/.*/SKILL\.md' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No SKILL.md changed — skipping eval"
            echo "skill=" >> $GITHUB_OUTPUT
          else
            SKILL_DIR=$(dirname "$CHANGED")
            echo "skill=$SKILL_DIR" >> $GITHUB_OUTPUT
            echo "skill_name=$(basename $SKILL_DIR)" >> $GITHUB_OUTPUT
          fi

      - name: Install eval platform
        if: steps.skill.outputs.skill != ''
        run: |
          cd eval-platform
          pip install -e .

      - name: Start mock MCP server
        if: steps.skill.outputs.skill != ''
        run: |
          cd eval-platform
          python eval/mock_mcp/server.py &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || { echo "mock MCP server failed to start"; exit 1; }

      - name: Run A/B eval
        if: steps.skill.outputs.skill != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGCHAIN_TRACING_V2: "false"
        run: |
          cd eval-platform
          python -m eval.ab_compare \
            --skill-path "${{ github.workspace }}/${{ steps.skill.outputs.skill }}" \
            --trials 5

      - name: Post PR comment
        if: steps.skill.outputs.skill != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsPath = path.join(
              process.env.GITHUB_WORKSPACE,
              'eval-platform',
              'ab_results.json'
            );

            if (!fs.existsSync(resultsPath)) {
              console.log('ab_results.json not found — skipping PR comment');
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const skill = '${{ steps.skill.outputs.skill_name }}';
            const delta = results.weighted_delta ?? 'n/a';
            const regressionRate = results.regression_rate ?? 'n/a';
            const verdict = results.verdict ?? 'UNKNOWN';
            const regressionTraces = results.regression_traces ?? {};

            const verdictEmoji = {
              PASS: '✅', WARN: '⚠️', SOFT_BLOCK: '🔶', BLOCK: '🚫',
            }[verdict] ?? '❓';

            const lines = [
              `## ${verdictEmoji} Skill Eval: \`${skill}\` — ${verdict}`,
              '',
              `| Metric | Value |`,
              `|---|---|`,
              `| Weighted Δ | \`${typeof delta === 'number' ? delta.toFixed(3) : delta}\` |`,
              `| Regression rate | \`${typeof regressionRate === 'number' ? (regressionRate * 100).toFixed(1) + '%' : regressionRate}\` |`,
              `| Verdict | **${verdict}** |`,
            ];

            const traceEntries = Object.entries(regressionTraces);
            if (traceEntries.length > 0) {
              lines.push('', '**Regressed tasks — Langfuse traces:**');
              for (const [taskId, url] of traceEntries) {
                lines.push(url ? `- [\`${taskId}\`](${url})` : `- \`${taskId}\` (no trace)`);
              }
            }

            if (verdict === 'BLOCK' || verdict === 'SOFT_BLOCK') {
              lines.push('', '> **Action required:** Fix regressions above before merging.');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
